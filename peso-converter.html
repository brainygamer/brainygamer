<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#ffffff" />
<title>Peso Converter</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f5f5f0;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .app { width: 100%; max-width: 400px; }
  h1 { font-size: 18px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 1.5rem; }
  .rate-bar {
    display: flex; align-items: center; justify-content: space-between;
    background: #fff; border: 1px solid #e8e8e3; border-radius: 12px;
    padding: 10px 14px; margin-bottom: 12px;
  }
  .rate-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.05em; }
  .rate-value { font-size: 14px; font-weight: 500; color: #1a1a1a; margin-top: 2px; }
  .refresh-btn {
    font-size: 12px; color: #555; padding: 6px 12px;
    border: 1px solid #ddd; border-radius: 8px;
    background: none; cursor: pointer;
  }
  .refresh-btn:active { background: #f0f0eb; }
  .card {
    background: #fff; border: 1px solid #e8e8e3;
    border-radius: 14px; padding: 16px 18px; margin-bottom: 10px;
  }
  .field-label { font-size: 12px; color: #999; margin-bottom: 8px; }
  .field-row { display: flex; align-items: center; gap: 10px; }
  .currency-code { font-size: 14px; font-weight: 600; color: #555; min-width: 36px; }
  .amount-input {
    flex: 1; font-size: 32px; font-weight: 500; color: #1a1a1a;
    border: none; background: transparent; outline: none; width: 100%;
  }
  .amount-input::placeholder { color: #ccc; }
  .result-amount { font-size: 32px; font-weight: 500; color: #1a1a1a; }
  .swap-btn {
    width: 100%; display: flex; align-items: center; justify-content: center;
    gap: 6px; padding: 12px; border: 1px solid #e0e0db; border-radius: 10px;
    background: none; cursor: pointer; font-size: 14px; color: #666;
    margin-bottom: 10px;
  }
  .swap-btn:active { background: #f0f0eb; }
  .quick-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
    margin-top: 16px;
  }
  .quick-btn {
    padding: 10px 4px; border: 1px solid #e8e8e3; border-radius: 10px;
    background: #fff; font-size: 13px; color: #555; cursor: pointer;
    text-align: center;
  }
  .quick-btn:active { background: #f0f0eb; }
  .error { font-size: 12px; color: #c0392b; margin-top: 10px; text-align: center; }
  .updated { font-size: 11px; color: #aaa; margin-top: 16px; text-align: center; }
</style>
</head>
<body>
<div class="app">
  <h1>Peso Converter</h1>
  <p class="subtitle">Live MXN / USD exchange rate</p>

  <div class="rate-bar">
    <div>
      <div class="rate-label">Current rate</div>
      <div class="rate-value" id="rate-display">Fetching…</div>
    </div>
    <button class="refresh-btn" id="refresh-btn" onclick="fetchRate()">Refresh</button>
  </div>

  <div class="card">
    <div class="field-label" id="from-label">Mexican peso</div>
    <div class="field-row">
      <span class="currency-code" id="from-code">MXN</span>
      <input class="amount-input" type="number" id="amount-input"
        placeholder="0" inputmode="decimal" oninput="convert()" />
    </div>
  </div>

  <button class="swap-btn" onclick="swapCurrencies()">⇅ Swap currencies</button>

  <div class="card">
    <div class="field-label" id="to-label">US dollar</div>
    <div class="field-row">
      <span class="currency-code" id="to-code">USD</span>
      <div class="result-amount" id="result">—</div>
    </div>
  </div>

  <div class="quick-grid">
    <button class="quick-btn" onclick="setAmount(100)">100</button>
    <button class="quick-btn" onclick="setAmount(500)">500</button>
    <button class="quick-btn" onclick="setAmount(1000)">1,000</button>
    <button class="quick-btn" onclick="setAmount(5000)">5,000</button>
  </div>

  <div class="error" id="error-msg"></div>
  <div class="updated" id="updated-msg"></div>
</div>

<script>
let rate = null;
let usdToMxn = null;
let direction = 'MXN_to_USD';

async function fetchRate() {
  const btn = document.getElementById('refresh-btn');
  const rateDisplay = document.getElementById('rate-display');
  const errorMsg = document.getElementById('error-msg');
  const updatedMsg = document.getElementById('updated-msg');
  btn.textContent = 'Updating…';
  btn.disabled = true;
  errorMsg.textContent = '';
  try {
    const res = await fetch('https://api.frankfurter.app/latest?from=USD&to=MXN');
    if (!res.ok) throw new Error('Bad response');
    const data = await res.json();
    usdToMxn = data.rates.MXN;
    updateRateDisplay();
    const now = new Date();
    updatedMsg.textContent = 'Last updated ' + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    convert();
  } catch(e) {
    errorMsg.textContent = 'Could not fetch rate. Check your connection and try refreshing.';
    rateDisplay.textContent = 'Unavailable';
  } finally {
    btn.textContent = 'Refresh';
    btn.disabled = false;
  }
}

function updateRateDisplay() {
  if (!usdToMxn) return;
  const rateDisplay = document.getElementById('rate-display');
  if (direction === 'MXN_to_USD') {
    rate = 1 / usdToMxn;
    rateDisplay.textContent = '1 MXN = ' + rate.toFixed(4) + ' USD';
  } else {
    rate = usdToMxn;
    rateDisplay.textContent = '1 USD = ' + usdToMxn.toFixed(2) + ' MXN';
  }
}

function convert() {
  const input = parseFloat(document.getElementById('amount-input').value);
  const result = document.getElementById('result');
  if (!rate || isNaN(input)) { result.textContent = '—'; return; }
  const converted = input * rate;
  result.textContent = converted.toLocaleString('en-US', {
    minimumFractionDigits: 2, maximumFractionDigits: 2
  });
}

function setAmount(val) {
  document.getElementById('amount-input').value = val;
  convert();
}

function swapCurrencies() {
  direction = direction === 'MXN_to_USD' ? 'USD_to_MXN' : 'MXN_to_USD';
  const fromLabel = document.getElementById('from-label');
  const fromCode = document.getElementById('from-code');
  const toLabel = document.getElementById('to-label');
  const toCode = document.getElementById('to-code');
  document.getElementById('amount-input').value = '';
  document.getElementById('result').textContent = '—';
  if (direction === 'MXN_to_USD') {
    fromLabel.textContent = 'Mexican peso'; fromCode.textContent = 'MXN';
    toLabel.textContent = 'US dollar'; toCode.textContent = 'USD';
  } else {
    fromLabel.textContent = 'US dollar'; fromCode.textContent = 'USD';
    toLabel.textContent = 'Mexican peso'; toCode.textContent = 'MXN';
  }
  updateRateDisplay();
  convert();
}

fetchRate();
</script>
</body>
</html>
