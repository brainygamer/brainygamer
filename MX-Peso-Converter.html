  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

t(90deg, transparent, var(--marigold), transparent);\n    margin-bottom: 10px;\n  }\n  .header::after { margin-bottom: 0; margin-top: 10px; }\n\n  h1 {\n    font-family: 'Playfair Display', serif;\n    font-size: 26px;\n    font-weight: 700;\n    color: var(--clay);\n    letter-spacing: -0.01em;\n    line-height: 1.1;\n  }\n  .subtitle {\n    font-size: 12px;\n    color: var(--ink-muted);\n    margin-top: 4px;\n    text-transform: uppercase;\n    letter-spacing: 0.12em;\n    font-weight: 500;\n  }\n\n  /* ── Rate bar ── */\n  .rate-bar {\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    background: var(--clay);\n    border-radius: 14px;\n    padding: 12px 16px;\n    margin-bottom: 14px;\n    box-shadow: 0 4px 16px rgba(196,80,26,.30);\n  }\n  .rate-label {\n    font-size: 10px;\n    color: rgba(255,255,255,.65);\n    text-transform: uppercase;\n    letter-spacing: 0.1em;\n    font-weight: 500;\n  }\n  .rate-value {\n    font-size: 15px;\n    font-weight: 600;\n    color: #fff;\n    margin-top: 3px;\n    font-family: 'Playfair Display', serif;\n  }\n  .refresh-btn {\n    font-size: 11px;\n    font-family: 'DM Sans', sans-serif;\n    font-weight: 600;\n    color: var(--clay);\n    padding: 6px 13px;\n    border: none;\n    border-radius: 8px;\n    background: var(--marigold);\n    cursor: pointer;\n    letter-spacing: 0.04em;\n    text-transform: uppercase;\n    transition: background .15s;\n  }\n  .refresh-btn:active { background: #c98a10; }\n  .refresh-btn:disabled { opacity: .6; cursor: default; }\n\n  /* ── Cards ── */\n  .card {\n    background: #fff;\n    border: 1.5px solid var(--border);\n    border-radius: 16px;\n    padding: 18px 20px;\n    margin-bottom: 10px;\n    position: relative;\n    box-shadow: 0 2px 8px rgba(42,21,5,.07);\n  }\n  .card::before {\n    content: '';\n    position: absolute;\n    top: 0; left: 16px; right: 16px;\n    height: 3px;\n    background: linear-gradient(90deg, var(--marigold), var(--clay));\n    border-radius: 0 0 4px 4px;\n    opacity: .7;\n  }\n\n  .field-label {\n    font-size: 11px;\n    color: var(--ink-muted);\n    margin-bottom: 10px;\n    text-transform: uppercase;\n    letter-spacing: 0.1em;\n    font-weight: 500;\n  }\n  .field-row { display: flex; align-items: center; gap: 10px; }\n  .currency-code {\n    font-family: 'Playfair Display', serif;\n    font-size: 16px;\n    font-weight: 700;\n    color: var(--clay);\n    min-width: 42px;\n    padding-right: 10px;\n    border-right: 2px solid var(--parchment);\n  }\n  .amount-input {\n    flex: 1;\n    font-size: 36px;\n    font-weight: 300;\n    color: var(--ink);\n    border: none;\n    background: transparent;\n    outline: none;\n    width: 100%;\n    font-family: 'DM Sans', sans-serif;\n  }\n  .amount-input::placeholder { color: #d4bfa0; }\n  /* hide number input arrows */\n  .amount-input::-webkit-outer-spin-button,\n  .amount-input::-webkit-inner-spin-button { -webkit-appearance: none; }\n  .amount-input[type=number] { -moz-appearance: textfield; }\n\n  .result-amount {\n    font-size: 36px;\n    font-weight: 300;\n    color: var(--clay-dark);\n    font-family: 'DM Sans', sans-serif;\n  }\n\n  /* ── Swap button ── */\n  .swap-btn {\n    width: 100%;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    gap: 8px;\n    padding: 13px;\n    border: 1.5px dashed var(--marigold);\n    border-radius: 12px;\n    background: rgba(232,160,32,.06);\n    cursor: pointer;\n    font-size: 13px;\n    font-family: 'DM Sans', sans-serif;\n    font-weight: 600;\n    color: var(--clay);\n    margin-bottom: 10px;\n    letter-spacing: 0.04em;\n    text-transform: uppercase;\n    transition: background .15s, border-color .15s;\n  }\n  .swap-btn:active { background: rgba(232,160,32,.15); }\n  .swap-icon {\n    font-size: 16px;\n    display: inline-block;\n    transition: transform .3s;\n  }\n  .swap-btn:active .swap-icon { transform: rotate(180deg); }\n\n  /* ── Quick grid ── */\n  .quick-grid {\n    display: grid;\n    grid-template-columns: repeat(4, 1fr);\n    gap: 8px;\n    margin-top: 14px;\n  }\n  .quick-btn {\n    padding: 11px 4px;\n    border: 1.5px solid var(--border);\n    border-radius: 12px;\n    background: var(--parchment);\n    font-size: 13px;\n    font-weight: 600;\n    color: var(--ink);\n    cursor: pointer;\n    text-align: center;\n    font-family: 'DM Sans', sans-serif;\n    transition: background .12s, border-color .12s, color .12s;\n  }\n  .quick-btn:active,\n  .quick-btn:hover {\n    background: var(--clay);\n    border-color: var(--clay);\n    color: #fff;\n  }\n\n  /* ── Footer text ── */\n  .error {\n    font-size: 12px;\n    color: #b03a1a;\n    margin-top: 12px;\n    text-align: center;\n    font-weight: 500;\n  }\n  .updated {\n    font-size: 11px;\n    color: var(--ink-muted);\n    margin-top: 14px;\n    text-align: center;\n    letter-spacing: 0.04em;\n  }\n\n  /* ── Decorative bottom tag ── */\n  .mercado-tag {\n    text-align: center;\n    margin-top: 28px;\n    font-size: 11px;\n    color: var(--ink-muted);\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    opacity: .55;\n  }\n  .mercado-tag span { color: var(--clay); font-weight: 700; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<div class=\"app\">\n\n  <div class=\"header\">\n    <h1>Peso Converter<\u002Fh1>\n    <p class=\"subtitle\">Live MXN / USD exchange rate<\u002Fp>\n  <\u002Fdiv>\n\n  <div class=\"rate-bar\">\n    <div>\n      <div class=\"rate-label\">Current rate<\u002Fdiv>\n      <div class=\"rate-value\" id=\"rate-display\">Fetching…<\u002Fdiv>\n    <\u002Fdiv>\n    <button class=\"refresh-btn\" id=\"refresh-btn\" onclick=\"fetchRate()\">Refresh<\u002Fbutton>\n  <\u002Fdiv>\n\n  <div class=\"card\">\n    <div class=\"field-label\" id=\"from-label\">Mexican peso<\u002Fdiv>\n    <div class=\"field-row\">\n      <span class=\"currency-code\" id=\"from-code\">MXN<\u002Fspan>\n      <input class=\"amount-input\" type=\"number\" id=\"amount-input\" placeholder=\"0\" inputmode=\"decimal\" oninput=\"convert()\">\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <button class=\"swap-btn\" onclick=\"swapCurrencies()\">\n    <span class=\"swap-icon\">⇅<\u002Fspan> Swap currencies\n  <\u002Fbutton>\n\n  <div class=\"card\">\n    <div class=\"field-label\" id=\"to-label\">US dollar<\u002Fdiv>\n    <div class=\"field-row\">\n      <span class=\"currency-code\" id=\"to-code\">USD<\u002Fspan>\n      <div class=\"result-amount\" id=\"result\">—<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"quick-grid\">\n    <button class=\"quick-btn\" onclick=\"setAmount(100)\">100<\u002Fbutton>\n    <button class=\"quick-btn\" onclick=\"setAmount(500)\">500<\u002Fbutton>\n    <button class=\"quick-btn\" onclick=\"setAmount(1000)\">1,000<\u002Fbutton>\n    <button class=\"quick-btn\" onclick=\"setAmount(5000)\">5,000<\u002Fbutton>\n  <\u002Fdiv>\n\n  <div class=\"error\" id=\"error-msg\"><\u002Fdiv>\n  <div class=\"updated\" id=\"updated-msg\"><\u002Fdiv>\n\n  <p class=\"mercado-tag\">✦ <span>Mercado<\u002Fspan> de divisas ✦<\u002Fp>\n<\u002Fdiv>\n\n<script>\nlet rate = null;\nlet usdToMxn = null;\nlet direction = 'MXN_to_USD';\n\nasync function fetchRate() {\n  const btn = document.getElementById('refresh-btn');\n  const rateDisplay = document.getElementById('rate-display');\n  const errorMsg = document.getElementById('error-msg');\n  const updatedMsg = document.getElementById('updated-msg');\n  btn.textContent = 'Updating…';\n  btn.disabled = true;\n  errorMsg.textContent = '';\n  try {\n    const res = await fetch('https://api.frankfurter.dev/v2/rate/USD/MXN');\n    if (!res.ok) throw new Error('Bad response');\n    const data = await res.json();\n    usdToMxn = data.rate;\n    updateRateDisplay();\n    const now = new Date();\n    updatedMsg.textContent = 'Last updated ' + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });\n    convert();\n  } catch(e) {\n    errorMsg.textContent = 'Could not fetch rate. Check your connection and try refreshing.';\n    rateDisplay.textContent = 'Unavailable';\n  } finally {\n    btn.textContent = 'Refresh';\n    btn.disabled = false;\n  }\n}\n\nfunction updateRateDisplay() {\n  if (!usdToMxn) return;\n  const rateDisplay = document.getElementById('rate-display');\n  if (direction === 'MXN_to_USD') {\n    rate = 1 / usdToMxn;\n    rateDisplay.textContent = '1 MXN = ' + rate.toFixed(4) + ' USD';\n  } else {\n    rate = usdToMxn;\n    rateDisplay.textContent = '1 USD = ' + usdToMxn.toFixed(2) + ' MXN';\n  }\n}\n\nfunction convert() {\n  const input = parseFloat(document.getElementById('amount-input').value);\n  const result = document.getElementById('result');\n  if (!rate || isNaN(input)) { result.textContent = '—'; return; }\n  const converted = input * rate;\n  result.textContent = converted.toLocaleString('en-US', {\n    minimumFractionDigits: 2, maximumFractionDigits: 2\n  });\n}\n\nfunction setAmount(val) {\n  document.getElementById('amount-input').value = val;\n  convert();\n}\n\nfunction swapCurrencies() {\n  direction = direction === 'MXN_to_USD' ? 'USD_to_MXN' : 'MXN_to_USD';\n  const fromLabel = document.getElementById('from-label');\n  const fromCode = document.getElementById('from-code');\n  const toLabel = document.getElementById('to-label');\n  const toCode = document.getElementById('to-code');\n  document.getElementById('amount-input').value = '';\n  document.getElementById('result').textContent = '—';\n  if (direction === 'MXN_to_USD') {\n    fromLabel.textContent = 'Mexican peso'; fromCode.textContent = 'MXN';\n    toLabel.textContent = 'US dollar'; toCode.textContent = 'USD';\n  } else {\n    fromLabel.textContent = 'US dollar'; fromCode.textContent = 'USD';\n    toLabel.textContent = 'Mexican peso'; toCode.textContent = 'MXN';\n  }\n  updateRateDisplay();\n  convert();\n}\n\nfetchRate();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
